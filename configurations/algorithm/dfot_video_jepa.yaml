# DFoT with dual-encoder JEPA (BYOL-style)
#
# - Target VAE encoder is frozen; provides stable latents for DFoT.
# - Online VAE encoder is trainable; learns predictive representations.
# - ViT predictor operates on clean latents from the online encoder.
# - EMA periodically syncs online -> target encoder.

defaults:
  - dfot_video

# JEPA-specific configuration
jepa:
  # Loss weight for JEPA prediction loss (combined with DFoT loss)
  loss_weight: 1.0
  # Training mode: teacher_forcing or autoregressive
  training_mode: teacher_forcing

  # Learning rates
  lr: 1e-4       # for predictor + action encoder
  encoder_lr: 1e-5  # for online encoder (lower for stability)

  # EMA update schedule
  ema_decay: 0.999
  ema_update_every: 100  # steps

  # Action encoder config
  action_embed_dim: 256
  action_hidden_dim: 256

  # ViT Predictor config
  predictor_hidden_dim: 512
  predictor_depth: 4
  predictor_heads: 8
  predictor_dim_head: 64
  predictor_mlp_ratio: 4.0
  predictor_dropout: 0.1

  # Decoder reconstruction loss (collapse diagnostic)
  # Set decoder_loss_weight > 0 to enable
  decoder_loss_weight: 0.0     # overall weight in total_loss
  decoder_mse_weight: 1.0      # weight on pixel MSE term
  decoder_lpips_weight: 1.0    # weight on LPIPS perceptual term
  decoder_lr: 1e-4             # lr for online_decoder + online_post_quant_conv
  decoder_vis_every: 2        # log reconstruction frames every N training steps
