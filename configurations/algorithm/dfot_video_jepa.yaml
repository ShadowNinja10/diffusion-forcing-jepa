# DFoT with dual-encoder JEPA (BYOL-style)
#
# - Target VAE encoder is frozen; provides stable latents for DFoT.
# - Online VAE encoder is trainable; learns predictive representations.
# - ViT predictor operates on clean latents from the online encoder.
# - EMA periodically syncs online -> target encoder.

defaults:
  - dfot_video

# JEPA-specific configuration
jepa:
  # Loss weight for JEPA prediction loss (combined with DFoT loss)
  loss_weight: 1.0
  # Training mode: teacher_forcing, autoregressive, or mixed
  training_mode: teacher_forcing
  # Mixed mode annealing: steps before AR probability starts rising
  ar_warmup_steps: 5000
  # Mixed mode annealing: max probability of using autoregressive training
  ar_target_prob: 0.5
  # DiT zp conditioning source (only used by decoupled variant):
  # "predicted" = JEPA-predicted zp (principled), "gt" = ground-truth encoder zp
  dit_zp_source: predicted

  # Learning rates
  lr: 1e-4       # for predictor + action encoder
  encoder_lr: 1e-5  # for online encoder (lower for stability)

  # EMA update schedule
  ema_decay: 0.999
  ema_update_every: 100  # steps

  # Action encoder config
  action_embed_dim: 256
  action_hidden_dim: 256

  # ViT Predictor config
  predictor_hidden_dim: 512
  predictor_depth: 4
  predictor_heads: 8
  predictor_dim_head: 64
  predictor_mlp_ratio: 4.0
  predictor_dropout: 0.1

  # DFoT loss weight: scale the diffusion backbone loss.
  # When finetuning from a pretrained DFoT backbone, consider reducing to
  # 0.1-0.5 so the backbone adapts slowly to the evolving latent distribution.
  # Monitor dfot_loss -- if it rises sharply the backbone isn't keeping up.
  dfot_loss_weight: 1.0

  # Decoder reconstruction loss & visualization
  # Set decoder_loss_weight > 0 to enable (always saves vis regardless)
  decoder_loss_weight: 4.0     # overall weight in total_loss
  # When recon_regularizer=true the decoder loss (≈0.095) is ~4x smaller than
  # JEPA loss (≈0.35-0.5). To meaningfully regularize the encoder, consider
  # decoder_loss_weight: 3.0-5.0 so reconstruction gradients are comparable to
  # JEPA gradients at the encoder.
  decoder_mse_weight: 1.0      # weight on pixel MSE term
  decoder_lpips_weight: 1.0    # weight on LPIPS perceptual term
  decoder_lr: 1e-4             # lr for online_decoder + online_post_quant_conv
  decoder_vis_every: 10000         # log reconstruction frames every N training steps
  decoder_vis_enabled: false       # set false to disable decoder reconstruction logging
  # Reconstruction regularizer: when true, decoder loss gradients flow through
  # the encoder (acts as anti-collapse regularizer). When false, encoder is
  # detached and decoder loss is purely diagnostic.
  recon_regularizer: false
  # Skip the decoder forward+backward on non-N steps when recon_regularizer
  # is false.  The decoder is purely diagnostic in that case, so running it
  # every step wastes compute.  Set to 1 to run every step (no skip).
  decoder_loss_every: 50
  # Frames per chunk in the decoder forward pass during training.
  # Larger chunks reduce loop overhead and improve GPU utilization.
  decoder_chunk_size: 4
  # Run LPIPS VGG16 in float16 via autocast (roughly 2x faster on modern GPUs).
  decoder_lpips_amp: true
  # Compute LPIPS every K steps; MSE-only on other steps.
  # Set to 1 to run LPIPS every step (default).
  decoder_lpips_every: 50
  # Normalize latents before JEPA predictor using the tracked data_mean/data_std.
  # Keeps loss scale consistent regardless of raw latent magnitude.
  normalize_jepa_latents: true

  # Step timing: when true, log per-phase wall-clock times to find bottlenecks.
  # Use log_step_timing_freq to log every N steps (default 10) to reduce overhead.
  log_step_timing: false
  log_step_timing_freq: 10
