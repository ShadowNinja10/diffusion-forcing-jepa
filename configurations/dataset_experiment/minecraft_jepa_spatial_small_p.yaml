# @package _global_
# Minecraft standalone Spatial JEPA training with smaller predictor
#
# USAGE:
# ------
#   python main.py \
#     +name=jepa_spatial_small_p \
#     experiment=video_generation \
#     dataset=minecraft \
#     algorithm=jepa_spatial_small_p \
#     dataset_experiment=minecraft_jepa_spatial_small_p \
#     experiment.training.batch_size=1 \
#     dataset.max_frames=8 dataset.context_length=4

dataset:
  latent:
    enable: True
    type: online
  subdataset_size: null  # required for step-based validation (val_every_n_step)
  num_eval_videos: 768

algorithm:
  lr_scheduler:
    name: constant_with_warmup
    num_warmup_steps: 5000
    num_training_steps: 200000
  weight_decay: 0.001
  compile: false

  vae:
    pretrained_path: pretrained:ImageVAE_MCRAFT.ckpt
    batch_size: 2

  jepa:
    loss_weight: 1.0
    training_mode: teacher_forcing
    lr: 1e-4
    encoder_lr: 1e-5
    ema_decay: 0.999
    ema_update_every: 100
    action_embed_dim: 256
    action_hidden_dim: 256
    predictor_hidden_dim: 512
    predictor_depth_small: 2
    predictor_heads: 8
    predictor_dim_head: 64
    predictor_mlp_ratio: 4.0
    predictor_dropout: 0.1
    spatial_patch_size: 2
    spatial_factorized_attention: true
    normalize_jepa_latents: true
    decoder_loss_weight: 4.0
    decoder_mse_weight: 1.0
    decoder_lpips_weight: 1.0
    decoder_lr: 1e-4
    decoder_vis_every: 500
    recon_regularizer: false
    decoder_chunk_size: 4
    decoder_lpips_amp: true
    decoder_lpips_every: 50
    decoder_vis_enabled: true
    decoder_loss_every: 1
    drift_log_every: 100
    collapse_log_every: 50
    save_weights: false

  logging:
    max_num_videos: 32

experiment:
  training:
    lr: 1e-4
    batch_size: 1
    max_epochs: 15
    optim:
      gradient_clip_val: 1.0
  validation:
    batch_size: 16
    data:
      num_workers: 0
  test:
    batch_size: 16
    data:
      num_workers: 0
