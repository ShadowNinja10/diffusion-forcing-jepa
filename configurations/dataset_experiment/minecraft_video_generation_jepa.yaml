# @package _global_
# Minecraft video generation with dual-encoder JEPA (BYOL-style)
#
# USAGE:
# ------
# Finetune from pre-trained DFoT (recommended):
#   python main.py \
#     +name=jepa_dual_encoder \
#     experiment=video_generation \
#     dataset=minecraft \
#     algorithm=dfot_video_jepa \
#     dataset_experiment=minecraft_video_generation_jepa \
#     load=pretrained:DFoT_MCRAFT.ckpt \
#     algorithm.checkpoint.strict=false \
#     @DiT/B @diffusion/continuous \
#     experiment.training.batch_size=1 \
#     experiment.find_unused_parameters=true \
#     dataset.max_frames=8 dataset.context_length=4
#
# The target VAE is loaded from algorithm.vae.pretrained_path and frozen.
# The online encoder is a trainable copy of the target encoder.
# JEPA components (predictor, action_encoder, online_encoder) are randomly
# initialised when loading a pre-trained DFoT checkpoint (this is expected).

dataset:
  latent:
    enable: True
    type: online  # JEPA requires online VAE processing
  subdataset_size: 1920000
  num_eval_videos: 768

algorithm:
  lr_scheduler:
    name: constant_with_warmup
    num_warmup_steps: 10000
    num_training_steps: 200000
  weight_decay: 0.001
  compile: false

  diffusion:
    loss_weighting:
      strategy: sigmoid
      sigmoid_bias: -1.0
    training_schedule:
      name: cosine
      shift: 0.125
    beta_schedule: cosine_simple_diffusion
    schedule_fn_kwargs:
      shifted: 0.125

  uniform_future:
    enabled: true

  backbone:
    patch_size: 2
    external_cond_dropout: 0.1

  vae:
    pretrained_path: pretrained:ImageVAE_MCRAFT.ckpt
    batch_size: 2

  # JEPA settings (dual-encoder, BYOL-style)
  jepa:
    loss_weight: 1.0
    training_mode: teacher_forcing
    lr: 1e-4
    encoder_lr: 1e-5
    ema_decay: 0.999
    ema_update_every: 100
    # Action encoder
    action_embed_dim: 256
    action_hidden_dim: 256
    # ViT Predictor
    predictor_hidden_dim: 512
    predictor_depth: 4
    predictor_heads: 8
    predictor_dim_head: 64
    predictor_mlp_ratio: 4.0
    predictor_dropout: 0.1
    # Decoder reconstruction loss (collapse diagnostic)
    decoder_loss_weight: 0.0
    decoder_mse_weight: 1.0
    decoder_lpips_weight: 1.0
    decoder_lr: 1e-4
    decoder_vis_every: 2      # log reconstruction frames every N training steps

  logging:
    max_num_videos: 32

experiment:
  training:
    lr: 1e-4
    batch_size: 1
    max_epochs: 15
  validation:
    batch_size: 16
    data:
      num_workers: 0
  test:
    batch_size: 16
    data:
      num_workers: 0
